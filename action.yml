name: "Annotate GTNH issue"
description: "Annotate GTNH issue upon their creation"
inputs:
  formdata:
    description: "Parsed form data as a json string"
    required: true
  sections:
    description: "Form data sections to search"
    required: false
    default: "Crash Report"
outputs:
  comment:
    description: "Comment to be sent to issue. Can be empty if nothing worthwhile is found."

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: pip
        cache-dependency-path: ${{ github.action_path }}/requirements.txt

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run
      id: run
      shell: bash
      env:
        INPUT_FORMDATA: ${{ inputs.formdata }}  # github_action_utils reads INPUT_* vars
        INPUT_SECTIONS: ${{ inputs.sections }}
      run: python ${{ github.action_path }}/entrypoint.py
